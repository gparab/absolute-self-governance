apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-governance-webhook
  labels:
    app: self-governance-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: self-governance-webhook
  template:
    metadata:
      labels:
        app: self-governance-webhook
    spec:
      containers:
      - name: webhook
        image: self-governance-image:latest
        command: ["uvicorn", "self_governance.github_app:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: database-url
        - name: ALLOW_GUEST_ACCESS
          value: "False"
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: github-secrets
              key: webhook-secret
        - name: ADMIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: admin-secrets
              key: api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secrets
              key: api-key
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: self-governance-webhook-service
spec:
  selector:
    app: self-governance-webhook
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: self-governance-webhook-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: self-governance-webhook
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
