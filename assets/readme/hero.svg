<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="title desc">
  <title id="title">Absolute Self-Governance</title>
  <desc id="desc">A council of role-based agents votes on which roles a task needs via TETD consensus, and team size scales with measured task complexity -- shown here as the real swarm-sizing output for a trivial task versus a complex one.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2335"/>
      <stop offset="100%" stop-color="#171a29"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="26" fill="url(#bgGrad)"/>

  <!-- subtle dial motif, top-right corner, echoing TETD's threshold/temperature dial -->
  <g transform="translate(1140 48)" opacity="0.55">
    <circle r="20" fill="none" stroke="#e0af68" stroke-width="2"/>
    <line x1="0" y1="0" x2="13" y2="-13" stroke="#e0af68" stroke-width="2" stroke-linecap="round"/>
    <circle r="2.5" fill="#e0af68"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="64" y="60" font-size="15" letter-spacing="2" fill="#7aa2f7" font-weight="600">MULTI-AGENT ORCHESTRATION · CONSENSUS-GOVERNED</text>
    <text x="64" y="112" font-size="44" font-weight="700" fill="#f2f0ea">Absolute Self-Governance</text>

    <text x="64" y="152" font-size="18" fill="#c0caf5">A council of agents votes on which roles a task needs. Team size scales</text>
    <text x="64" y="178" font-size="18" fill="#c0caf5">to measured complexity — never a fixed roster, never guesswork.</text>
  </g>

  <!-- left column: quickstart -->
  <g transform="translate(64 214)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="0" y="0" width="500" height="80" rx="12" fill="#13151f" stroke="#2a2f45"/>
    <text x="20" y="30" font-size="14" fill="#9ece6a">$ pipx install absolute-self-governance</text>
    <text x="20" y="56" font-size="14" fill="#9ece6a">$ self-governance demo</text>
    <text x="0" y="118" font-size="13" fill="#6b7089" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Python 3.11+ · MIT License · zero API key for the demo</text>
  </g>

  <!-- right column: real proof, actual swarm-sizing output -->
  <g id="project-proof" transform="translate(636 214)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="0" font-size="12.5" letter-spacing="1.3" fill="#6b7089" font-weight="600">REAL OUTPUT — dimension_swarm(), same math as production</text>

    <text x="0" y="38" font-size="14" fill="#c0caf5">trivial task</text>
    <rect x="0" y="48" width="44" height="24" rx="5" fill="#7aa2f7"/>
    <text x="54" y="65" font-size="14" fill="#f2f0ea" font-weight="600">1 agent</text>

    <text x="0" y="106" font-size="14" fill="#c0caf5">complex task</text>
    <rect x="0" y="116" width="396" height="24" rx="5" fill="#e0af68"/>
    <text x="406" y="133" font-size="14" fill="#f2f0ea" font-weight="600">9 agents</text>

    <text x="0" y="172" font-size="12.5" fill="#6b7089">Same transition matrix, no manual staffing — complexity in, roster out.</text>
  </g>
</svg>
